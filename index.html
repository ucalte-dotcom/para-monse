<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti ❤️</title>

<style>
body{
margin:0;
font-family: Arial, sans-serif;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

.screen{display:none;}

button{
padding:12px 20px;
border:none;
border-radius:20px;
background:#f43f5e;
color:white;
cursor:pointer;
margin-top:20px;
}
</style>
</head>

<body>

<!-- S1 -->
<div id="s1" class="screen" style="display:block;">
  <h1>Hola, mi cielo ❤️</h1>
  <button onclick="go(2)">Abrir mi tesoro</button>
</div>

<!-- S2 -->
<div id="s2" class="screen">
  <h1>Bienvenida, Pingüina 🐧</h1>
  <button onclick="go(3)">Continuar</button>
</div>

<!-- S3 (CARTA) -->
<div id="s3" class="screen">
  <h2>El acceso a una pequeña parte de mi corazón</h2>

  <p>Hola, mi cielo.</p>
  <p>Gracias por llegar hasta aquí.</p>
  <p>No era un secreto, era un instante para ti.</p>
  <p>Me alegra que estés aquí conmigo.</p>

  <p><b>Tu Pingüi 🐧❤️</b></p>
</div>

<script>
function go(n){
  document.getElementById("s1").style.display = "none";
  document.getElementById("s2").style.display = "none";
  document.getElementById("s3").style.display = "none";

  document.getElementById("s"+n).style.display = "block";
}
</script>

</body>
</html>
